<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wichita Fore Vision Golf Tournament — Collateral Matrix</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="dashboard">
      <aside class="sidebar">
        <h1>Wichita Fore Vision Golf Tournament — Collateral Matrix</h1>
        <nav id="sidebar-nav" aria-label="Collateral sections"></nav>
      </aside>

      <main id="content" class="content" aria-live="polite"></main>
    </div>

    <div id="asset-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
      <button id="modal-close" class="modal-close" aria-label="Close preview">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="2" y1="2" x2="16" y2="16"/><line x1="16" y1="2" x2="2" y2="16"/></svg>
      </button>
      <div class="modal-content">
        <div class="modal-nav">
          <button id="modal-prev" class="modal-arrow" type="button" aria-label="Previous file">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9,2 4,7 9,12"/></svg>
          </button>
          <button id="modal-next" class="modal-arrow" type="button" aria-label="Next file">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="5,2 10,7 5,12"/></svg>
          </button>
        </div>
        <h2 id="modal-title"></h2>
        <div id="modal-preview" class="modal-preview"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
